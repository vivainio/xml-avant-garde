# ============================================================================
# XML Avant-Garde — Zensical configuration
# Docs: https://zensical.org/docs/setup/basics/
# ============================================================================

[project]

site_name = "XML Avant-Garde"
site_description = "Hands-on tutorials for the XML family — starting with XSLT."
site_author = "Ville Vainio"
site_url = "https://vivainio.github.io/xml-avant-garde/"

copyright = """
Copyright &copy; 2026 Ville Vainio
"""

# Source repository — enables the edit/view content actions below.
repo_url = "https://github.com/vivainio/xml-avant-garde"
repo_name = "vivainio/xml-avant-garde"

# Explicit navigation. New top-level sections (XPath, XSD, Schematron, …) can be
# added here as the site grows.
nav = [
  { "Home" = "index.md" },
  { "XSLT Tutorial" = [
    { "Overview" = "xslt/index.md" },
    { "Your first transformation" = "xslt/first-transformation.md" },
    { "Templates" = "xslt/templates.md" },
    { "Named templates and parameters" = "xslt/named-templates.md" },
    { "Variables" = "xslt/variables.md" },
    { "Loops and output" = "xslt/loops-and-output.md" },
    { "Conditionals" = "xslt/conditionals.md" },
    { "XPath predicates" = "xslt/predicates.md" },
    { "String functions" = "xslt/strings.md" },
    { "Producing XML output" = "xslt/output.md" },
    { "Sorting" = "xslt/sorting.md" },
    { "Number formatting" = "xslt/number-formatting.md" },
    { "Whitespace and xsl:text" = "xslt/whitespace.md" },
    { "Template modes" = "xslt/modes.md" },
    { "Reusing stylesheets" = "xslt/reuse.md" },
    { "External documents" = "xslt/external-documents.md" },
    { "Keys and indexed lookup" = "xslt/keys.md" },
    { "XSLT 2.0 & 3.0" = [
      { "Moving to XSLT 2.0 and 3.0" = "xslt/moving-to-3.md" },
      { "User-defined functions" = "xslt/functions.md" },
      { "Grouping" = "xslt/grouping.md" },
      { "Regular expressions and strings" = "xslt/regex.md" },
      { "Modern identity and text" = "xslt/modern-identity.md" },
      { "Reading and writing JSON" = "xslt/json.md" },
    ] },
  ] },
  { "XPath" = [
    { "Overview" = "xpath/index.md" },
    { "Location paths" = "xpath/location-paths.md" },
    { "Axes" = "xpath/axes.md" },
    { "Node tests and predicates" = "xpath/node-tests-predicates.md" },
    { "Functions and data types" = "xpath/functions-and-types.md" },
  ] },
  { "XSD" = [
    { "Overview" = "xsd/index.md" },
    { "Elements and types" = "xsd/elements-and-types.md" },
    { "Complex types" = "xsd/complex-types.md" },
    { "Simple types and restrictions" = "xsd/simple-types-restrictions.md" },
    { "Modular schemas" = "xsd/modular-schemas.md" },
  ] },
  { "Schematron" = [
    { "Overview" = "schematron/index.md" },
    { "Rules and assertions" = "schematron/rules-and-assertions.md" },
    { "Context and tests" = "schematron/context-and-tests.md" },
    { "Variables and messages" = "schematron/variables-and-messages.md" },
    { "Abstract patterns and EN16931" = "schematron/abstract-patterns-en16931.md" },
  ] },
  { "Real-world e-invoicing" = [
    { "Overview" = "einvoicing/index.md" },
    { "Anatomy of a UBL invoice" = "einvoicing/ubl-invoice.md" },
    { "A UBL invoice in detail" = "einvoicing/ubl-invoice-detail.md" },
    { "The validation pipeline" = "einvoicing/validation-pipeline.md" },
    { "Genericode code lists" = "einvoicing/genericode-codelists.md" },
    { "Peppol and CIUS profiles" = "einvoicing/peppol-cius.md" },
    { "Glossary" = "einvoicing/glossary.md" },
  ] },
]

extra_css = ["stylesheets/extra.css"]

# ----------------------------------------------------------------------------
# Theme
# ----------------------------------------------------------------------------
[project.theme]
language = "en"
features = [
    "announce.dismiss",
    "content.action.edit",
    "content.action.view",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    "navigation.sections",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
]

[project.theme.icon]
logo = "lucide/code-xml"
# nav section icons use lucide/folder-tree etc. via page front matter

[[project.theme.palette]]
scheme = "default"
primary = "indigo"
accent = "indigo"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "indigo"
accent = "indigo"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/vivainio/xml-avant-garde"

# ----------------------------------------------------------------------------
# Markdown extensions
# ----------------------------------------------------------------------------
[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.arithmatex]
generic = true
[project.markdown_extensions.pymdownx.betterem]
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.magiclink]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
combine_header_slug = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
[project.markdown_extensions.pymdownx.tilde]
